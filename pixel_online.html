<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Minimal Pixel Editor</title>
<style>
  body {
    font-family: sans-serif;
    background: #222;
    color: #eee;
    display: flex;
    gap: 20px;
    padding: 20px;
  }
  canvas {
    background: #444;
    border: 1px solid #666;
    image-rendering: pixelated;
    cursor: crosshair;
  }
  .panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
</style>
</head>
<body>

<canvas id="view"></canvas>

<div class="panel">
  <label>
    颜色：
    <input type="color" id="color" value="#000000">
  </label>
  <button id="clear">清空</button>
</div>

<script>
/* ========= 核心参数 ========= */

const GRID_W = 32;
const GRID_H = 32;
const SCALE  = 16;

/* ========= PixelGrid（唯一真实数据） ========= */

const grid = {
  w: GRID_W,
  h: GRID_H,
  pixels: new Uint32Array(GRID_W * GRID_H)
};

// 初始化为白色
grid.pixels.fill(0xffffffff);

/* ========= Canvas 设置 ========= */

const canvas = document.getElementById('view');
canvas.width  = GRID_W * SCALE;
canvas.height = GRID_H * SCALE;

const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

/* 离屏 canvas：画“真实分辨率” */
const off = document.createElement('canvas');
off.width  = GRID_W;
off.height = GRID_H;
const offCtx = off.getContext('2d', { willReadFrequently: true });

const imgData = offCtx.createImageData(GRID_W, GRID_H);
const buf = imgData.data;

/* ========= 渲染 ========= */

function redraw() {
  // PixelGrid → ImageData
  for (let i = 0; i < grid.pixels.length; i++) {
    const c = grid.pixels[i];
    buf[i*4+0] =  c & 255;
    buf[i*4+1] = (c >> 8) & 255;
    buf[i*4+2] = (c >> 16) & 255;
    buf[i*4+3] = 255;
  }

  offCtx.putImageData(imgData, 0, 0);

  // 放大显示
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(
    off,
    0, 0, GRID_W, GRID_H,
    0, 0, canvas.width, canvas.height
  );
}

redraw();

/* ========= 编辑（鼠标 → 像素） ========= */

let currentColor = 0xff000000;
let drawing = false;

function setPixelFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) * GRID_W / rect.width);
  const y = Math.floor((e.clientY - rect.top)  * GRID_H / rect.height);

  if (x < 0 || y < 0 || x >= GRID_W || y >= GRID_H) return;

  grid.pixels[y * GRID_W + x] = currentColor;
  redraw();
}

canvas.addEventListener('mousedown', e => {
  drawing = true;
  setPixelFromEvent(e);
});

canvas.addEventListener('mousemove', e => {
  if (drawing) setPixelFromEvent(e);
});

window.addEventListener('mouseup', () => drawing = false);

/* ========= UI ========= */

document.getElementById('color').addEventListener('input', e => {
  const hex = e.target.value;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  currentColor = (255<<24) | (b<<16) | (g<<8) | r;
});

document.getElementById('clear').onclick = () => {
  grid.pixels.fill(0xffffffff);
  redraw();
};
</script>

</body>
</html>
